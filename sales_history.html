<!DOCTYPE html>
<html>
<head>
  <title>Stock History</title>

  <style>
    body {
      font-family: Arial;
      background: #f4f6f8;
      padding: 20px;
    }

    input {
      padding: 8px;
      width: 250px;
      margin-bottom: 15px;
    }

    .card {
      background: white;
      padding: 12px;
      margin-bottom: 10px;
      border-radius: 8px;
    }

    button {
      margin-bottom: 20px;
      padding: 8px 12px;
      border: none;
      background: #2563eb;
      color: white;
      cursor: pointer;
    }
  </style>
</head>

<body>

<button onclick="goBack()">⬅ Back to Dashboard</button>

<h2>Sales History</h2>

<input type="text" id="search" placeholder="Search product..." oninput="filterHistory()">
<button onclick="goToSearch()">Search</button>
<div id="history"></div>

<script>
const API_URL = "https://inventory-system-eipk.onrender.com";

let allHistory = [];

function goBack() {
  window.location.href = "dashboard.html";
}

// LOAD DATA
async function loadHistory() {
  const res = await fetch(`${API_URL}/stock_history`);
  const data = await res.json();

  allHistory = data;
  displayHistory(allHistory);
}

// DISPLAY FUNCTION
function displayHistory(data) {
  const container = document.getElementById("history");
  container.innerHTML = "";

  if (!data || data.length === 0) {
    container.innerHTML = "<p>No history available</p>";
    return;
  }

  data.forEach(function(h) {
    container.innerHTML += `
      <div class="card">
        <p><strong>${h.name}</strong></p>
        <p>Added: ${h.quantity_added}</p>
        <p>Date: ${new Date(h.created_at).toLocaleString()}</p>
      </div>
    `;
  });
}

// 🔍 FILTER FUNCTION
function filterHistory() {
  const query = document.getElementById("search").value.toLowerCase();

  const filtered = allHistory.filter(function(h) {
    return h.name.toLowerCase().includes(query);
  });

  displayHistory(filtered);

}

window.onload = function() {
  loadHistory();
};

container.innerHTML = "Loading...";
</script>

</body>
</html>
