<!DOCTYPE html>
<html>
<head>
  <title>Sales History</title>

  <style>
    body {
      font-family: Arial;
      background: #f4f6f8;
      padding: 20px;
    }

    .topbar {
      margin-bottom: 15px;
    }

    input {
      padding: 8px;
      margin: 5px;
    }

    button {
      padding: 8px 12px;
      border: none;
      background: #2563eb;
      color: white;
      cursor: pointer;
      border-radius: 5px;
    }

    .print {
      background: #16a34a;
    }

    .card {
      background: white;
      padding: 12px;
      margin-bottom: 10px;
      border-radius: 8px;
    }

    .filters {
      margin-bottom: 15px;
    }

    .total-box {
      font-weight: bold;
      font-size: 18px;
      margin-top: 10px;
    }

    /* PRINT CLEANUP */
    @media print {
      button, input {
        display: none;
      }
      body {
        background: white;
      }
    }
  </style>
</head>

<body>

<div class="topbar">
  <button onclick="goBack()">⬅ Dashboard</button>
  <button class="print" onclick="printReport()">🖨 Print</button>
</div>

<h2>📊 Sales History</h2>

<!-- 🔍 FILTERS -->
<div class="filters">

  <!-- Product Search -->
  <input type="text" id="search" placeholder="Product name">
  <button onclick="applyFilters()">Search</button>

  <br>

  <!-- Date Range -->
  <input type="date" id="startDate">
  <input type="date" id="endDate">
  <button onclick="applyFilters()">Filter by Date</button>

  <button onclick="resetFilters()">Reset</button>

</div>

<div id="history"></div>

<div class="total-box">
  Total Revenue: <span id="totalRevenue">0</span>
</div>

<script>

const API_URL = "https://inventory-system-eipk.onrender.com";

let allSales = [];

// BACK
function goBack() {
  window.location.href = "dashboard.html";
}

// LOAD DATA
async function loadHistory() {
  const res = await fetch(`${API_URL}/sales/`);
  const data = await res.json();

  allSales = data;
  displayHistory(allSales);
}

// DISPLAY
function displayHistory(data) {
  const container = document.getElementById("history");
  container.innerHTML = "";

  let totalRevenue = 0;

  if (!data || data.length === 0) {
    container.innerHTML = "<p>No sales found</p>";
    document.getElementById("totalRevenue").innerText = 0;
    return;
  }

  data.forEach(sale => {
    const total = sale.price * sale.quantity;
    totalRevenue += total;

    container.innerHTML += `
      <div class="card">
        <strong>${sale.product_name}</strong><br>
        Size: ${sale.size}<br>
        Qty: ${sale.quantity}<br>
        Price: ${sale.price}<br>
        Total: <b>${total}</b><br>
        Date: ${new Date(sale.created_at).toLocaleString()}
      </div>
    `;
  });

  document.getElementById("totalRevenue").innerText = totalRevenue;
}

// APPLY FILTERS
function applyFilters() {
  const query = document.getElementById("search").value.toLowerCase();
  const start = document.getElementById("startDate").value;
  const end = document.getElementById("endDate").value;

  let filtered = allSales;

  // 🔍 Filter by product name
  if (query) {
    filtered = filtered.filter(s =>
      s.product_name.toLowerCase().includes(query)
    );
  }

  // 📅 Filter by date range
  if (start) {
    filtered = filtered.filter(s =>
      new Date(s.created_at) >= new Date(start)
    );
  }

  if (end) {
    filtered = filtered.filter(s =>
      new Date(s.created_at) <= new Date(end + "T23:59:59")
    );
  }

  displayHistory(filtered);
}

// RESET
function resetFilters() {
  document.getElementById("search").value = "";
  document.getElementById("startDate").value = "";
  document.getElementById("endDate").value = "";

  displayHistory(allSales);
}

// PRINT
function printReport() {
  window.print();
}

// INIT
window.onload = function() {
  loadHistory();
};

</script>

</body>
</html>
