<body>

<div class="card">

<h2 id="title">Login</h2>

<input id="email" placeholder="Email">
<input id="password" type="password" placeholder="Password">

<button onclick="submitAuth()">Submit</button>

<div class="toggle" onclick="toggleMode()">
  Switch to Register
</div>

</div>

<script>

let isLogin = true;

function toggleMode() {
  isLogin = !isLogin;
  document.getElementById("title").innerText = isLogin ? "Login" : "Register";
  document.querySelector(".toggle").innerText =
    isLogin ? "Switch to Register" : "Switch to Login";
}

async function submitAuth() {
  const email = document.getElementById("email").value;
  const password = document.getElementById("password").value;

  const url = isLogin
    ? "https://inventory-system-eipk.onrender.com/auth/login"
    : "https://inventory-system-eipk.onrender.com/auth/register";

  const res = await fetch(url, {
    method: "POST",
    headers: {"Content-Type": "application/json"},
    body: JSON.stringify({ email, password })
  });

  const data = await res.json();

  if (!res.ok) {
    alert(data.detail || "Error");
    return;
  }

  if (isLogin) {
    localStorage.setItem("token", data.access_token);
    window.location.href = "dashboard.html";
  } else {
    alert("Registered! Now login.");
    toggleMode();
  }
}
container.innerHTML = "Loading...";
</script>
