<!DOCTYPE html>
<html>
<head>
  <title>Auth</title>

  <!-- 🚀 SPEED BOOST -->
  <link rel="preconnect" href="https://inventory-system-eipk.onrender.com">

  <!-- 📱 MOBILE -->
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      font-family: Arial;
      background: #f4f6f8;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      margin: 0;
    }

    .card {
      background: white;
      padding: 25px;
      border-radius: 10px;
      width: 300px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.1);
    }

    h2 {
      text-align: center;
      margin-bottom: 15px;
    }

    input {
      width: 100%;
      padding: 10px;
      margin: 6px 0;
      border: 1px solid #ddd;
      border-radius: 6px;
    }

    button {
      width: 100%;
      padding: 12px;
      margin-top: 10px;
      border: none;
      background: #2563eb;
      color: white;
      cursor: pointer;
      border-radius: 6px;
      min-height: 40px;
    }

    button:disabled {
      background: #9ca3af;
      cursor: not-allowed;
    }

    .toggle {
      text-align: center;
      margin-top: 10px;
      cursor: pointer;
      color: #2563eb;
    }

    /* 📱 MOBILE */
    @media (max-width: 768px) {
      .card {
        width: 90%;
      }
    }
  </style>
</head>

<body>

<div class="card">
  <h2 id="title">Login</h2>

  <input id="email" placeholder="Email" autofocus>
  <input id="password" type="password" placeholder="Password">

  <button id="submitBtn" onclick="submitAuth()">Submit</button>

  <div class="toggle" onclick="toggleMode()">
    Switch to Register
  </div>
</div>

<script>

let isLogin = true;

// 🔄 TOGGLE LOGIN / REGISTER
function toggleMode() {
  isLogin = !isLogin;

  document.getElementById("title").innerText = isLogin ? "Login" : "Register";
  document.querySelector(".toggle").innerText =
    isLogin ? "Switch to Register" : "Switch to Login";
}

// 🚀 AUTH FUNCTION (FAST + CLEAN)
async function submitAuth() {
  const email = document.getElementById("email").value.trim();
  const password = document.getElementById("password").value.trim();
  const button = document.getElementById("submitBtn");

  if (!email || !password) {
    alert("Enter email and password");
    return;
  }

  const url = isLogin
    ? "https://inventory-system-eipk.onrender.com/auth/login"
    : "https://inventory-system-eipk.onrender.com/auth/register";

  try {
    // ⚡ INSTANT FEEDBACK
    button.innerText = "Processing...";
    button.disabled = true;

    const res = await fetch(url, {
      method: "POST",
      headers: {
        "Content-Type": "application/json"
      },
      body: JSON.stringify({ email, password })
    });

    const data = await res.json();

    if (!res.ok) {
      throw new Error(data.detail || "Something went wrong");
    }

    // ✅ SUCCESS
    if (isLogin) {
      localStorage.setItem("token", data.access_token);
      window.location.href = "dashboard.html";
    } else {
      alert("Registered successfully. Please login.");
      toggleMode();
    }

  } catch (err) {
    alert(err.message);
  } finally {
    // 🔄 RESET BUTTON
    button.innerText = "Submit";
    button.disabled = false;
  }
}

// ⌨️ ENTER KEY SUPPORT
document.addEventListener("keypress", function(e) {
  if (e.key === "Enter") submitAuth();
});

</script>

</body>
</html>
