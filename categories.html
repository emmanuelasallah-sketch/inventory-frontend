</head>

<body>

<div class="topbar">
  <h2>Categories</h2>
  <button onclick="goBack()">⬅ Dashboard</button>
</div>

<!-- ADD -->
<div>
  <input id="name" placeholder="New category">
  <button onclick="addCategory()">Add</button>
</div>

<div id="list"></div>

<script>

const API = "https://inventory-system-eipk.onrender.com";

// BACK
function goBack() {
  window.location.href = "dashboard.html";
}

// LOAD
async function load() {
  const res = await fetch(`${API}/categories/`);
  const data = await res.json();

  const list = document.getElementById("list");
  list.innerHTML = "";

  data.forEach(c => {
    list.innerHTML += `
      <div class="card">
        <span>${c.name}</span>

        <div class="actions">
          <button onclick="editCategory('${c.id}')">Edit</button>
          <button class="delete" onclick="deleteCategory('${c.id}')">Delete</button>
        </div>
      </div>
    `;
  });
}

// ADD
async function addCategory() {
  const name = document.getElementById("name").value;

  await fetch(`${API}/categories/`, {
    method: "POST",
    headers: {"Content-Type": "application/json"},
    body: JSON.stringify({ name })
  });

  document.getElementById("name").value = "";
  load();
}

// EDIT
async function editCategory(id) {
  const name = prompt("New name:");

  if (!name) return;

  await fetch(`${API}/categories/${id}`, {
    method: "PUT",
    headers: {"Content-Type": "application/json"},
    body: JSON.stringify({ name })
  });

  load();
}

// DELETE
async function deleteCategory(id) {
  if (!confirm("Delete category?")) return;

  await fetch(`${API}/categories/${id}`, {
    method: "DELETE"
  });

  load();
}

window.onload = load;

</script>

</body>
</html>
