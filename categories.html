<!DOCTYPE html>
<html>
<head>
  <title>Categories</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      font-family: Arial;
      background: #f4f6f8;
      padding: 20px;
    }

    .topbar {
      display: flex;
      gap: 10px;
      align-items: center;
    }

    input, button {
      padding: 10px;
      border-radius: 6px;
      border: 1px solid #ddd;
    }

    button {
      background: #2563eb;
      color: white;
      border: none;
      cursor: pointer;
      min-height: 40px;
    }

    .category {
      background: white;
      padding: 15px;
      margin-top: 20px;
      border-radius: 10px;
    }

    .product {
      background: #f9fafb;
      padding: 10px;
      margin-top: 5px;
      border-radius: 6px;
    }

    /* ================= MOBILE RESPONSIVE SYSTEM ================= */
    @media (max-width: 768px) {

      body {
        padding: 10px;
      }

      .topbar {
        flex-direction: column;
        align-items: flex-start;
        gap: 10px;
      }

      /* STACK INPUT SECTIONS */
      div[style*="margin-top:10px"],
      div[style*="margin-top:15px"] {
        display: flex;
        flex-direction: column;
        gap: 10px;
      }

      input, button {
        width: 100%;
        font-size: 16px;
      }

      button {
        padding: 12px;
      }

      .category {
        padding: 12px;
      }

      .product {
        font-size: 14px;
        padding: 8px;
      }
    }

  </style>
</head>

<body>

<div class="topbar">
  <button onclick="goBack()">⬅ Dashboard</button>
  <h2>Categories</h2>
</div>

<div style="margin-top:10px;">
  <input id="newCategory" placeholder="New category">
  <button onclick="addCategory()">Add</button>
</div>

<div style="margin-top:15px;">
  <input id="search" placeholder="Search product" oninput="filterProducts()">
  <button onclick="loadData()">Search</button>
</div>

<div id="container"></div>

<script>
const API = "https://inventory-system-eipk.onrender.com";

function goBack() {
  window.location.href = "dashboard.html";
}

async function addCategory() {
  const name = document.getElementById("newCategory").value;

  if (!name) {
    alert("Enter category name");
    return;
  }

  await fetch(`${API}/categories/`, {
    method: "POST",
    headers: {"Content-Type": "application/json"},
    body: JSON.stringify({ name })
  });

  document.getElementById("newCategory").value = "";
  loadData();
}

let cachedProducts = [];
let cachedCategories = [];

async function loadData() {
  try {
    const catRes = await fetch(`${API}/categories/`);
    cachedCategories = await catRes.json();

    const prodRes = await fetch(`${API}/products/`);
    cachedProducts = await prodRes.json();

    if (!Array.isArray(cachedProducts)) cachedProducts = [];
    if (!Array.isArray(cachedCategories)) cachedCategories = [];

    renderFiltered("");

  } catch (err) {
    console.error("Load error:", err);
    alert("Failed to load data");
  }
}

function filterProducts() {
  const search = document.getElementById("search").value.toLowerCase();
  renderFiltered(search);
}

function renderFiltered(search) {
  const container = document.getElementById("container");
  container.innerHTML = "";

  cachedCategories.forEach(cat => {
    const section = document.createElement("div");
    section.className = "category";

    section.innerHTML = `<h3>${cat.name}</h3>`;

    const items = cachedProducts.filter(p =>
      String(p.category_id) === String(cat.id) &&
      (p.name || "").toLowerCase().includes(search)
    );

    if (items.length === 0) {
      section.innerHTML += `<p>No products</p>`;
    } else {
      items.forEach(p => {
        section.innerHTML += `
          <div class="product">
            ${p.name} (${p.size})
          </div>
        `;
      });
    }

    container.appendChild(section);
  });
}

window.onload = loadData;
</script>

</body>
</html>
