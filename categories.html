<!DOCTYPE html>
<html>
<head>
  <title>Categories</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      font-family: Arial;
      background: #f4f6f8;
      padding: 20px;
    }

    .topbar {
      display: flex;
      gap: 10px;
      align-items: center;
    }

    input, button {
      padding: 10px;
      border-radius: 6px;
      border: 1px solid #ddd;
    }

    button {
      background: #2563eb;
      color: white;
      border: none;
      cursor: pointer;
      min-height: 40px;
    }

    .category {
      background: white;
      padding: 15px;
      margin-top: 20px;
      border-radius: 10px;
    }

    .product {
      background: #f9fafb;
      padding: 10px;
      margin-top: 5px;
      border-radius: 6px;
    }
  </style>
</head>

<body>

<div class="topbar">
  <button onclick="goBack()">⬅ Dashboard</button>
  <h2>Categories</h2>
</div>

<!-- ✅ ADD CATEGORY (RESTORED) -->
<div style="margin-top:10px;">
  <input id="newCategory" placeholder="New category">
  <button onclick="addCategory()">Add</button>
</div>

<!-- ✅ SEARCH (KEPT) -->
<div style="margin-top:15px;">
  <input id="search" placeholder="Search product">
  <button onclick="loadData()">Search</button>
</div>

<!-- CONTAINER -->
<div id="container"></div>

<script>
const API = "https://inventory-system-eipk.onrender.com";

function goBack() {
  window.location.href = "dashboard.html";
}

// ✅ ADD CATEGORY (WORKING)
async function addCategory() {
  const name = document.getElementById("newCategory").value;

  if (!name) {
    alert("Enter category name");
    return;
  }

  await fetch(`${API}/categories/`, {
    method: "POST",
    headers: {"Content-Type": "application/json"},
    body: JSON.stringify({ name })
  });

  document.getElementById("newCategory").value = "";
  loadData();
}

// ✅ LOAD EVERYTHING PROPERLY
async function loadData() {
  const search = document.getElementById("search").value.toLowerCase();

  try {
    const catRes = await fetch(`${API}/categories/`);
    const categories = await catRes.json();

    const prodRes = await fetch(`${API}/products/`);
    let products = await prodRes.json();

    // SEARCH FILTER (IMPORTANT: does NOT remove categories)
    if (search) {
      products = products.filter(p =>
        p.name.toLowerCase().includes(search)
      );
    }

    const container = document.getElementById("container");
    container.innerHTML = "";

    categories.forEach(cat => {
      const section = document.createElement("div");
      section.className = "category";

      section.innerHTML = `<h3>${cat.name}</h3>`;

      // FIX: ensure matching works correctly
      const items = products.filter(p => String(p.category_id) === String(cat.id));

      if (items.length === 0) {
        section.innerHTML += `<p>No products</p>`;
      } else {
        items.forEach(p => {
          section.innerHTML += `
            <div class="product">
              <b>${p.name}</b> (${p.size})<br>
              Stock: ${p.stock} | Price: ${p.price}
            </div>
          `;
        });
      }

      container.appendChild(section);
    });

  } catch (err) {
    console.error(err);
    alert("Error loading categories");
  }
}

// INIT
window.onload = loadData;
</script>

</body>
</html>
