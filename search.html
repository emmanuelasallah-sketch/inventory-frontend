<!DOCTYPE html>
<html>
<head>
  <title>Product Search</title>

  <style>
    body {
      font-family: Arial;
      background: #f4f6f8;
      padding: 20px;
    }

    h2 {
      margin-bottom: 10px;
    }

    input {
      padding: 10px;
      width: 300px;
      border: 1px solid #ccc;
      border-radius: 5px;
    }

    .suggestions {
      background: white;
      border: 1px solid #ddd;
      max-width: 300px;
      position: absolute;
      z-index: 1000;
    }

    .suggestions div {
      padding: 8px;
      cursor: pointer;
    }

    .suggestions div:hover {
      background: #eee;
    }

    .card {
      background: white;
      padding: 12px;
      margin-top: 10px;
      border-radius: 8px;
    }

    .btn {
      padding: 6px 10px;
      margin-right: 5px;
      border: none;
      cursor: pointer;
      border-radius: 5px;
      color: white;
    }

    .edit { background: #f59e0b; }
    .sell { background: #16a34a; }
    .delete { background: #dc2626; }

  </style>
</head>

<body>

<h2>🔍 Product Search</h2>

<input id="search" placeholder="Search product..." oninput="showSuggestions()" />

<div id="suggestions" class="suggestions"></div>

<div id="results"></div>

<script>

const API_URL = "https://inventory-system-eipk.onrender.com";

let products = [];

// LOAD PRODUCTS
async function loadProducts() {
  const res = await fetch(`${API_URL}/products/`);
  products = await res.json();
}

loadProducts();

// AUTOCOMPLETE
function showSuggestions() {
  const input = document.getElementById("search").value.toLowerCase().trim();
  const box = document.getElementById("suggestions");

  box.innerHTML = "";

  if (!input) return;

  const filtered = products.filter(p =>
    p.name.toLowerCase().includes(input)
  );

  filtered.slice(0, 6).forEach(p => {
    const div = document.createElement("div");
    div.innerText = `${p.name} (${p.size || ""})`;

    div.onclick = () => {
      document.getElementById("search").value = p.name;
      box.innerHTML = "";
      renderProduct(p);
    };

    box.appendChild(div);
  });
}

// MAIN SEARCH
document.getElementById("search").addEventListener("keyup", function(e) {
  const query = e.target.value.toLowerCase().trim();

  const match = products.filter(p =>
    p.name.toLowerCase().includes(query)
  );

  if (match.length === 1) {
    renderProduct(match[0]);
  }
});

// RENDER PRODUCT CARD
function renderProduct(p) {
  const container = document.getElementById("results");

  container.innerHTML = `
    <div class="card">
      <b>${p.name}</b><br>
      Size: ${p.size || "N/A"}<br>
      Stock: ${p.stock || 0}<br>
      Price: ${p.price || 0}<br><br>

      <button class="btn edit" onclick="editProduct('${p.id}')">✏️ Edit</button>
      <button class="btn sell" onclick="sellProduct('${p.name}')">🛒 Sell</button>
      <button class="btn delete" onclick="deleteProduct('${p.id}')">❌ Delete</button>
    </div>
  `;
}

// SELL → redirect to sales page
function sellProduct(name) {
  window.location.href = `sales.html?product=${encodeURIComponent(name)}`;
}

// DELETE PRODUCT
async function deleteProduct(id) {
  if (!confirm("Delete this product?")) return;

  await fetch(`${API_URL}/products/${id}`, {
    method: "DELETE"
  });

  alert("Deleted");
  loadProducts();
}

// EDIT PRODUCT (simple version → redirect)
function editProduct(id) {
  window.location.href = `edit_product.html?id=${id}`;
}

</script>

</body>
</html>
