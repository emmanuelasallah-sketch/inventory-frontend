<!DOCTYPE html>
<html>
<head>
  <title>Search Results</title>

  <style>
    body {
      font-family: Arial;
      background: #f4f6f8;
      padding: 20px;
    }

    h2 {
      margin-bottom: 10px;
    }

    .topbar {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .card {
      background: white;
      padding: 12px;
      margin-top: 10px;
      border-radius: 8px;
    }

    button {
      padding: 8px;
      margin-top: 5px;
      margin-right: 5px;
      background: #2563eb;
      color: white;
      border: none;
      cursor: pointer;
    }

    .empty {
      margin-top: 20px;
      color: gray;
    }
  </style>
</head>

<body>

<div class="topbar">
  <button onclick="goBack()">⬅ Back</button>
  <h2>Search Results</h2>
</div>

<div id="results">Loading...</div>

<script>

const API = "https://inventory-system-eipk.onrender.com";

// BACK
function goBack() {
  window.history.back();
}

// LOAD SEARCH RESULTS
window.onload = async function () {
  const params = new URLSearchParams(window.location.search);
  const query = params.get("q");

  const container = document.getElementById("results");

  if (!query) {
    container.innerHTML = "<p class='empty'>No search query provided</p>";
    return;
  }

  try {
    const res = await fetch(`${API}/products/`);
    let data = await res.json();

    // 🛡️ SAFETY CHECK
    if (!Array.isArray(data)) {
      console.error("API error:", data);
      container.innerHTML = "<p class='empty'>Error loading products</p>";
      return;
    }

    // FILTER
    const filtered = data.filter(p =>
      (p.name || "").toLowerCase().includes(query.toLowerCase())
    );

    render(filtered, query);

  } catch (err) {
    console.error(err);
    container.innerHTML = "<p class='empty'>Failed to load data</p>";
  }
};

// RENDER RESULTS
function render(data, query) {
  const container = document.getElementById("results");
  container.innerHTML = "";

  if (!data || data.length === 0) {
    container.innerHTML = `<p class='empty'>No results for "${query}"</p>`;
    return;
  }

  data.forEach(p => {
    container.innerHTML += `
      <div class="card">
        <h3>${p.name}</h3>

        <p>Size: ${p.size || "N/A"}</p>
        <p>Stock: ${p.stock ?? 0}</p>
        <p>Cost: ${p.price || 0}</p>
        <p>Selling: ${p.selling_price || "N/A"}</p>

        <button onclick="sell('${p.name}', '${p.size}')">Sell</button>
        <button onclick="deleteProduct('${p.id}')">Delete</button>
      </div>
    `;
  });
}

// SELL
async function sell(name, size) {
  const quantity = prompt("Enter quantity");
  if (!quantity) return;

  try {
    const res = await fetch(`${API}/products/sell`, {
      method: "POST",
      headers: {
        "Content-Type": "application/json"
      },
      body: JSON.stringify({
        name,
        size,
        quantity: parseInt(quantity)
      })
    });

    const data = await res.json();

    if (!res.ok) {
      alert(data.detail || "Sale failed");
      return;
    }

    alert("Sale recorded!");
    location.reload();

  } catch (err) {
    console.error(err);
    alert("Error processing sale");
  }
}

// DELETE
async function deleteProduct(id) {
  if (!confirm("Delete this product?")) return;

  try {
    await fetch(`${API}/products/${id}`, {
      method: "DELETE"
    });

    alert("Deleted!");
    location.reload();

  } catch (err) {
    console.error(err);
    alert("Delete failed");
  }
}

</script>

</body>
</html>
