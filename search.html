<!DOCTYPE html>
<html>
<head>
  <title>Product Search</title>

  <style>
    body {
      font-family: Arial;
      background: #f4f6f8;
      padding: 20px;
    }

    h2 {
      margin-bottom: 10px;
    }

    .search-box {
      position: relative;
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
    }

    input {
      padding: 10px;
      width: 250px;
      border: 1px solid #ccc;
      border-radius: 5px;
    }

    button {
      padding: 10px 15px;
      border: none;
      background: #2563eb;
      color: white;
      border-radius: 5px;
      cursor: pointer;
    }

    .suggestions {
      position: absolute;
      top: 45px;
      left: 0;
      background: white;
      border: 1px solid #ddd;
      width: 250px;
      z-index: 1000;
    }

    .suggestions div {
      padding: 8px;
      cursor: pointer;
    }

    .suggestions div:hover {
      background: #eee;
    }

    .card {
      background: white;
      padding: 12px;
      margin-top: 10px;
      border-radius: 8px;
    }

    .btn {
      padding: 6px 10px;
      margin-right: 5px;
      border: none;
      border-radius: 5px;
      color: white;
      cursor: pointer;
    }

    .edit { background: #f59e0b; }
    .sell { background: #16a34a; }
    .delete { background: #dc2626; }

  </style>
</head>

<body>

<h2>🔍 Product Search</h2>

<div class="search-box">
  <input id="search" placeholder="Search product..." oninput="showSuggestions()">
  <button onclick="searchProduct()">Search</button>
</div>

<div id="suggestions" class="suggestions"></div>
<div id="results"></div>

<script>

const API_URL = "https://inventory-system-eipk.onrender.com";

let products = [];

// LOAD PRODUCTS
async function loadProducts() {
  const res = await fetch(`${API_URL}/products/`);
  products = await res.json();
}

// AUTOCOMPLETE
function showSuggestions() {
  const input = document.getElementById("search").value.toLowerCase().trim();
  const box = document.getElementById("suggestions");

  box.innerHTML = "";

  if (!input) return;

  const filtered = products.filter(p =>
    p.name.toLowerCase().includes(input)
  );

  filtered.slice(0, 5).forEach(p => {
    const div = document.createElement("div");
    div.innerText = `${p.name} (${p.size || ""})`;

    div.onclick = () => {
      document.getElementById("search").value = p.name;
      box.innerHTML = "";
      renderResults([p]);
    };

    box.appendChild(div);
  });
}

// SEARCH BUTTON FUNCTION
function searchProduct() {
  const query = document.getElementById("search").value.toLowerCase().trim();

  if (!query) {
    alert("Enter product name");
    return;
  }

  const results = products.filter(p =>
    p.name.toLowerCase().includes(query)
  );

  renderResults(results);
}

// AUTO SEARCH FROM URL
function autoSearchFromURL() {
  const params = new URLSearchParams(window.location.search);
  const query = params.get("q");

  if (!query) return;

  document.getElementById("search").value = query;
  searchProduct();
}

// RENDER MULTIPLE RESULTS
function renderResults(data) {
  const container = document.getElementById("results");
  container.innerHTML = "";

  if (!data.length) {
    container.innerHTML = "<p>No product found</p>";
    return;
  }

  data.forEach(p => {
    container.innerHTML += `
      <div class="card">
        <b>${p.name}</b><br>
        Size: ${p.size || "N/A"}<br>
        Stock: ${p.stock || 0}<br>
        Price: ${p.price || 0}<br><br>

        <button class="btn edit" onclick="editProduct('${p.id}')">✏️ Edit</button>
        <button class="btn sell" onclick="sellProduct('${p.name}')">🛒 Sell</button>
        <button class="btn delete" onclick="deleteProduct('${p.id}')">❌ Delete</button>
      </div>
    `;
  });
}

// SELL
function sellProduct(name) {
  window.location.href = `sales.html?product=${encodeURIComponent(name)}`;
}

// DELETE
async function deleteProduct(id) {
  if (!confirm("Delete this product?")) return;

  await fetch(`${API_URL}/products/${id}`, {
    method: "DELETE"
  });

  alert("Deleted");
  loadProducts();
  document.getElementById("results").innerHTML = "";
}

// EDIT
function editProduct(id) {
  window.location.href = `edit_product.html?id=${id}`;
}

// INIT
window.onload = async function() {
  await loadProducts();
  autoSearchFromURL();
};

</script>

</body>
</html>
