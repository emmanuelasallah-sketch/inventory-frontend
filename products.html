<!DOCTYPE html>
<html>
<head>
  <title>Products</title>

  <style>
    body {
      font-family: Arial;
      background: #f4f6f8;
      padding: 40px;
    }

    .form-row {
      display: flex;
      gap: 10px;
      margin-bottom: 10px;
    }

    input, select {
      padding: 8px;
    }

    button {
      padding: 8px 12px;
      background: #2563eb;
      color: white;
      border: none;
      cursor: pointer;
    }

    #message {
      margin-top: 10px;
      font-weight: bold;
    }
  </style>
</head>

<body>

<h2>Add Product</h2>

<div class="form-row">
  <input id="name" placeholder="Name">
  
  <select id="size">
    <option value="">Size</option>
    <option>Big</option>
    <option>Medium</option>
    <option>Small</option>
  </select>

  <select id="category"></select>

  <input id="price" type="number" placeholder="Price">
  <input id="stock" type="number" placeholder="Stock">
</div>

<div class="form-row">
  <input id="expiry" type="date">
</div>

<button onclick="addProduct()">Add Product</button>

<div id="message"></div>

<hr>

<h2>Products</h2>
<div id="productList"></div>

<script>

const API_URL = "https://inventory-system-eipk.onrender.com";

// ✅ LOAD CATEGORIES
async function loadCategories() {
  const res = await fetch(`${API_URL}/products/categories`);
  const categories = await res.json();

  const select = document.getElementById("category");
  select.innerHTML = `<option value="">Select Category</option>`;

  categories.forEach(cat => {
    select.innerHTML += `<option value="${cat.id}">${cat.name}</option>`;
  });
}

// ✅ ADD PRODUCT
async function addProduct() {
  const name = document.getElementById("name").value.trim();
  const size = document.getElementById("size").value;
  const category_id = document.getElementById("category").value;
  const price = parseFloat(document.getElementById("price").value);
  const stock = parseInt(document.getElementById("stock").value);
  const expiry = document.getElementById("expiry").value;

  const message = document.getElementById("message");

  if (!name || !size || isNaN(price) || isNaN(stock)) {
    message.innerHTML = "Fill all fields";
    message.style.color = "red";
    return;
  }

  const res = await fetch(`${API_URL}/products/`, {
    method: "POST",
    headers: {
      "Content-Type": "application/json"
    },
    body: JSON.stringify({
      name,
      size,
      price,
      stock,
      category_id,
      expiry_date: expiry
    })
  });

  const data = await res.json();

  if (data.detail || data.error) {
    message.innerHTML = data.detail || data.error;
    message.style.color = "red";
  } else {
    message.innerHTML = "✅ Product added";
    message.style.color = "green";
    loadProducts();
  }
}

// ✅ LOAD PRODUCTS
async function loadProducts() {
  const res = await fetch(`${API_URL}/products/`);
  const products = await res.json();

  const container = document.getElementById("productList");
  container.innerHTML = "";

  products.forEach(p => {
    container.innerHTML += `
      <div style="background:white;padding:10px;margin:5px">
        <b>${p.name}</b> (${p.size}) <br>
        Category: ${p.category_name || "N/A"} <br>
        Stock: ${p.stock} <br>
        Price: ${p.price} <br>
        Total Value: ${p.total_value}
      </div>
    `;
  });
}

// INIT
window.onload = function() {
  loadCategories();
  loadProducts();
};

</script>

</body>
</html>
