<!DOCTYPE html>
<html>
<head>
  <title>Products</title>

  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      font-family: Arial;
      background: #f4f6f8;
      padding: 20px;
    }

    .topbar {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 20px;
    }

    button {
      padding: 10px;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      background: #2563eb;
      color: white;
      min-height: 40px;
    }

    .secondary {
      background: #6b7280;
    }

    .row {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      margin-bottom: 10px;
    }

    input, select {
      padding: 8px;
      border: 1px solid #ddd;
      border-radius: 6px;
    }

    .card {
      background: white;
      padding: 12px;
      margin-top: 10px;
      border-radius: 8px;
    }

    .low-stock {
      border-left: 5px solid red;
    }

    /* MOBILE */
    @media (max-width: 768px) {
      .row {
        flex-direction: column;
      }

      input, select, button {
        width: 100%;
      }
    }
  </style>
</head>

<body>

<!-- TOP -->
<div class="topbar">
  <button class="secondary" onclick="goBack()">⬅ Dashboard</button>
  <h2>Products</h2>
</div>

<!-- ADD PRODUCT -->
<h3>Add Product</h3>

<div class="row">
  <input id="name" placeholder="Name">

  <select id="size">
    <option value="">Size</option>
    <option>Big</option>
    <option>Medium</option>
    <option>Small</option>
  </select>

  <select id="category">
    <option value="">-- Optional: Choose Category --</option>
  </select>

  <input id="price" type="number" placeholder="Cost Price">
  <input id="selling_price" type="number" placeholder="Selling Price (optional)">
</div>

<!-- PACK SYSTEM -->
<div class="row">
  <input id="pieces" type="number" placeholder="Pieces per Pack">
  <input id="packs" type="number" placeholder="Number of Packs">
  <input id="stock" type="number" placeholder="Or Enter Stock Directly">
</div>

<div class="row">
  <p>Expiry Date</p>
  <input id="expiry" type="date" >
  <button onclick="addProduct()">Add Product</button>
  <button onclick="clearForm()">Clear</button>
</div>

<p id="message"></p>

<hr>

<!-- SEARCH + FILTER -->
<div class="row">
  <input id="search" placeholder="Search..." oninput="filterProducts()">

  <select id="filterCategory">
    <option value="">All Categories</option>
  </select>

  <button onclick="handleSearch()">Search</button>
</div>

<!-- LIST -->
<div id="list"></div>

<!-- EDIT MODAL -->
<div id="editModal" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.5);">
  <div style="background:white; padding:20px; max-width:400px; margin:80px auto; border-radius:10px;">
    <h3>Edit Product</h3>

    <input id="edit_name"><br><br>

    <select id="edit_size">
      <option>Big</option>
      <option>Medium</option>
      <option>Small</option>
    </select><br><br>

    <select id="edit_category"></select><br><br>

    <input id="edit_price" type="number"><br><br>
    <input id="edit_selling_price" type="number" placeholder="Selling Price"><br><br>
    <input id="edit_stock" type="number"><br><br>

    <button onclick="updateProduct()">Save</button>
    <button onclick="closeEdit()" class="secondary">Cancel</button>
  </div>
</div>

<script>
const API = "https://inventory-system-eipk.onrender.com";

let products = [];
let currentEditId = null;

// NAV
function goBack() {
  window.location.href = "dashboard.html";
}

// LOAD CATEGORIES
async function loadCategories() {
  const res = await fetch(`${API}/categories/`);
  const data = await res.json();

  const c1 = document.getElementById("category");
  const c2 = document.getElementById("filterCategory");

  c1.innerHTML = `<option value="">-- Optional: Choose Category --</option>`;
  c2.innerHTML = `<option value="">All Categories</option>`;

  data.forEach(c => {
    c1.innerHTML += `<option value="${c.id}">${c.name}</option>`;
    c2.innerHTML += `<option value="${c.id}">${c.name}</option>`;
  });
}

// ADD PRODUCT
async function addProduct() {
  const pieces = Number(document.getElementById("pieces").value);
  const packs = Number(document.getElementById("packs").value);
  const manualStock = Number(document.getElementById("stock").value);

  let finalStock = manualStock;

  if (pieces && packs) {
    finalStock = pieces * packs;
  }

  const body = {
    name: document.getElementById("name").value,
    size: document.getElementById("size").value,
    category_id: document.getElementById("category").value || null,
    price: document.getElementById("price").value,
    selling_price: document.getElementById("selling_price").value || null,
    stock: finalStock,
    expiry_date: document.getElementById("expiry").value || null
  };

  const res = await fetch(`${API}/products/`, {
    method: "POST",
    headers: {"Content-Type": "application/json"},
    body: JSON.stringify(body)
  });

  const data = await res.json();
  document.getElementById("message").innerText =
    data.message || data.detail || "Saved";

  loadProducts();
}

// LOAD PRODUCTS
async function loadProducts() {
  const res = await fetch(`${API}/products/`);
  products = await res.json();
  render(products);
}

// FILTER
function filterProducts() {
  const search = document.getElementById("search").value.toLowerCase();
  const cat = document.getElementById("filterCategory").value;

  let filtered = products;

  if (search) {
    filtered = filtered.filter(p =>
      (p.name || "").toLowerCase().includes(search)
    );
  }

  if (cat) {
    filtered = filtered.filter(p => p.category_id === cat);
  }

  render(filtered);
}

function handleSearch() {
  filterProducts();
}


document.getElementById("search").addEventListener("keypress", function(e) {
  if (e.key === "Enter") {
    filterProducts();
  }
});
// RENDER
function render(data) {
  const div = document.getElementById("list");
  div.innerHTML = "";

  data.forEach(p => {
    div.innerHTML += `
      <div class="card ${p.low_stock ? 'low-stock' : ''}">
        <b>${p.name}</b> (${p.size})<br>
        Stock: ${p.stock}<br>
        Cost: ${p.price}<br>
        Selling: ${p.selling_price || "N/A"}<br>
        Category: ${p.category_name || "None"}<br><br>

        <button onclick="openEdit('${p.id}', '${p.name}', '${p.size}', '${p.price}', '${p.stock}', '${p.category_id}', '${p.selling_price || ""}')">Edit</button>
        <button onclick="deleteProduct('${p.id}')">Delete</button>
      </div>
    `;
  });
}

// DELETE
async function deleteProduct(id) {
  await fetch(`${API}/products/${id}`, { method: "DELETE" });
  loadProducts();
}

// CLEAR
function clearForm() {
  document.getElementById("name").value = "";
  document.getElementById("size").value = "";
  document.getElementById("category").value = "";
  document.getElementById("price").value = "";
  document.getElementById("selling_price").value = "";
  document.getElementById("pieces").value = "";
  document.getElementById("packs").value = "";
  document.getElementById("stock").value = "";
  document.getElementById("expiry").value = "";
}



// EDIT
async function openEdit(id, name, size, price, stock, category_id, selling_price) {
  currentEditId = id;

  document.getElementById("edit_name").value = name;
  document.getElementById("edit_size").value = size;
  document.getElementById("edit_price").value = price;
  document.getElementById("edit_stock").value = stock;
  document.getElementById("edit_selling_price").value = selling_price;

  const res = await fetch(`${API}/categories/`);
  const categories = await res.json();

  const select = document.getElementById("edit_category");
  select.innerHTML = "";

  categories.forEach(c => {
    select.innerHTML += `<option value="${c.id}">${c.name}</option>`;
  });

  select.value = category_id;

  document.getElementById("editModal").style.display = "block";
}

function closeEdit() {
  document.getElementById("editModal").style.display = "none";
}

async function updateProduct() {
  const body = {
    name: document.getElementById("edit_name").value,
    size: document.getElementById("edit_size").value,
    price: document.getElementById("edit_price").value,
    selling_price: document.getElementById("edit_selling_price").value || null,
    stock: document.getElementById("edit_stock").value,
    category_id: document.getElementById("edit_category").value || null
  };

  await fetch(`${API}/products/${currentEditId}`, {
    method: "PUT",
    headers: {"Content-Type": "application/json"},
    body: JSON.stringify(body)
  });

  closeEdit();
  loadProducts();
}

// INIT
window.onload = () => {
  loadCategories();
  loadProducts();
};
</script>

</body>
</html>
