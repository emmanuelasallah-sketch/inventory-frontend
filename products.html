</head>

<body>

<!-- TOP BAR -->
<div class="topbar">
  <button class="secondary" onclick="goBack()">⬅ Dashboard</button>
  <h2>Products</h2>
</div>

<!-- ADD PRODUCT -->
<h3>Add Product</h3>

<div class="row">
  <input id="name" placeholder="Name">
  <select id="size">
    <option value="">Size</option>
    <option>Big</option>
    <option>Medium</option>
    <option>Small</option>
  </select>

  <select id="category"></select>

  <input id="price" type="number" placeholder="Price">
  <input id="stock" type="number" placeholder="Stock">
</div>

<div class="row">
  <input id="expiry" type="date">
  <button onclick="addProduct()">Add Product</button>
  <button onclick="clearForm()">Clear</button>
</div>

<p id="message"></p>

<hr>

<!-- FILTER -->
<div class="row">
  <input id="search" placeholder="Search..." oninput="filterProducts()">
  <select id="filterCategory" onchange="filterProducts()"></select>
</div>

<!-- PRODUCT LIST -->
<div id="list"></div>

<script>

const API = "https://inventory-system-eipk.onrender.com";

let products = [];

// BACK
function goBack() {
  window.location.href = "dashboard.html";
}

// LOAD CATEGORIES
async function loadCategories() {
  const res = await fetch(`${API}/products/categories`);
  const data = await res.json();

  const c1 = document.getElementById("category");
  const c2 = document.getElementById("filterCategory");

  c1.innerHTML = `<option value="">Category</option>`;
  c2.innerHTML = `<option value="">All Categories</option>`;

  data.forEach(c => {
    c1.innerHTML += `<option value="${c.id}">${c.name}</option>`;
    c2.innerHTML += `<option value="${c.id}">${c.name}</option>`;
  });
}

// ADD PRODUCT
async function addProduct() {
  const body = {
    name: document.getElementById("name").value,
    size: document.getElementById("size").value,
    category_id: document.getElementById("category").value,
    price: document.getElementById("price").value,
    stock: document.getElementById("stock").value,
    expiry_date: document.getElementById("expiry").value
  };

  const res = await fetch(`${API}/products/`, {
    method: "POST",
    headers: {"Content-Type": "application/json"},
    body: JSON.stringify(body)
  });

  const data = await res.json();
  document.getElementById("message").innerText =
    data.message || data.detail || "Saved";

  loadProducts();
}

// LOAD PRODUCTS
async function loadProducts() {
  const res = await fetch(`${API}/products/`);
  products = await res.json();
  render(products);
}

// FILTER
function filterProducts() {
  const search = document.getElementById("search").value.toLowerCase();
  const cat = document.getElementById("filterCategory").value;

  let filtered = products;

  if (search) {
    filtered = filtered.filter(p =>
      p.name.toLowerCase().includes(search)
    );
  }

  if (cat) {
    filtered = filtered.filter(p => p.category_id === cat);
  }

  render(filtered);
}

// RENDER
function render(data) {
  const div = document.getElementById("list");
  div.innerHTML = "";

  data.forEach(p => {
    div.innerHTML += `
      <div class="card ${p.low_stock ? 'low-stock' : ''}">
        <b>${p.name}</b> (${p.size})<br>
        Stock: ${p.stock} | Price: ${p.price}<br>
        Total: ${p.total_value}<br>
        Category: ${p.category_name || "N/A"}<br><br>

        <button onclick="deleteProduct('${p.id}')">Delete</button>
      </div>
    `;
  });
}

// DELETE
async function deleteProduct(id) {
  await fetch(`${API}/products/${id}`, {
    method: "DELETE"
  });

  loadProducts();
}

// INIT
window.onload = () => {
  loadCategories();
  loadProducts();
};

</script>

</body>
</html>
