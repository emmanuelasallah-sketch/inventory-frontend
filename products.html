<!DOCTYPE html>
<html>
<head>
  <title>Products</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body { font-family: Arial; background: #f4f6f8; padding: 20px; }

    .topbar { display: flex; gap: 10px; align-items: center; }

    .row {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      margin: 10px 0;
    }

    input, select, button {
      padding: 10px;
      border-radius: 6px;
      border: 1px solid #ddd;
    }

    button {
      background: #2563eb;
      color: white;
      border: none;
      cursor: pointer;
      min-height: 40px;
    }

    .secondary { background: #6b7280; }

    .card {
      background: white;
      padding: 10px;
      margin-top: 10px;
      border-radius: 8px;
    }

    @media (max-width: 768px) {
      .row { flex-direction: column; }
      input, select, button { width: 100%; }
    }
  </style>
</head>

<body>

<div class="topbar">
  <button class="secondary" onclick="goBack()">⬅ Dashboard</button>
  <h2>Products</h2>
</div>

<!-- ADD PRODUCT -->
<div class="row">
  <input id="name" placeholder="Name">
  <select id="size">
    <option value="">Size</option>
    <option>Big</option>
    <option>Medium</option>
    <option>Small</option>
  </select>

  <select id="category"></select>

  <input id="price" type="number" placeholder="Price">
  <input id="stock" type="number" placeholder="Stock">
</div>

<div class="row">
  <input id="expiry" type="date">
  <button onclick="addProduct()">Add</button>
  <button class="secondary" onclick="clearForm()">Clear</button>
</div>

<p id="message"></p>

<hr>

<!-- SEARCH (KEPT + WORKING) -->
<div class="row">
  <input id="search" placeholder="Search product">
  <button onclick="searchProducts()">Search</button>
</div>

<!-- LIST -->
<div id="list"></div>

<script>
const API = "https://inventory-system-eipk.onrender.com";

let products = [];

function goBack() {
  window.location.href = "dashboard.html";
}

// LOAD CATEGORIES
async function loadCategories() {
  const res = await fetch(`${API}/categories`);
  const data = await res.json();

  const select = document.getElementById("category");
  select.innerHTML = `<option value="">Category</option>`;

  data.forEach(c => {
    select.innerHTML += `<option value="${c.id}">${c.name}</option>`;
  });
}

// ADD PRODUCT
async function addProduct() {
  const body = {
    name: document.getElementById("name").value,
    size: document.getElementById("size").value,
    category_id: document.getElementById("category").value,
    price: document.getElementById("price").value,
    stock: document.getElementById("stock").value,
    expiry_date: document.getElementById("expiry").value
  };

  const res = await fetch(`${API}/products/`, {
    method: "POST",
    headers: {"Content-Type": "application/json"},
    body: JSON.stringify(body)
  });

  const data = await res.json();

  document.getElementById("message").innerText =
    data.message || data.detail;

  loadProducts();
}

// CLEAR (ADDED WITHOUT REMOVING ANYTHING)
function clearForm() {
  document.getElementById("name").value = "";
  document.getElementById("size").value = "";
  document.getElementById("category").value = "";
  document.getElementById("price").value = "";
  document.getElementById("stock").value = "";
  document.getElementById("expiry").value = "";
}

// LOAD PRODUCTS
async function loadProducts() {
  const res = await fetch(`${API}/products/`);
  products = await res.json();
  render(products);
}

// SEARCH (KEPT)
function searchProducts() {
  const q = document.getElementById("search").value.toLowerCase();

  const filtered = products.filter(p =>
    p.name.toLowerCase().includes(q)
  );

  render(filtered);
}

// RENDER
function render(data) {
  const div = document.getElementById("list");
  div.innerHTML = "";

  data.forEach(p => {
    div.innerHTML += `
      <div class="card">
        <b>${p.name}</b> (${p.size})<br>
        Stock: ${p.stock} | Price: ${p.price}<br>
        Category: ${p.category_name || "N/A"}
      </div>
    `;
  });
}

// INIT
window.onload = () => {
  loadCategories();
  loadProducts();
};
</script>

</body>
</html>
