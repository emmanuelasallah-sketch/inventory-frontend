<!DOCTYPE html>
<html>
<head>
  <title>Products</title>

  <style>
    body {
      font-family: Arial;
      background: #f4f6f8;
      padding: 20px;
    }

    .topbar {
      display: flex;
      gap: 10px;
      align-items: center;
      margin-bottom: 20px;
    }

    input, select, button {
      padding: 8px;
      margin: 5px;
    }

    button {
      background: #2563eb;
      color: white;
      border: none;
      cursor: pointer;
    }

    .card {
      background: white;
      padding: 12px;
      margin-top: 10px;
      border-radius: 8px;
    }
  </style>
</head>

<body>

<div class="topbar">
  <button onclick="goBack()">⬅ Dashboard</button>
  <h2>Products</h2>
</div>

<!-- ADD PRODUCT -->
<h3>Add Product</h3>

<div>
  <input id="name" placeholder="Name">
  <input id="size" placeholder="Size">
  <input id="price" type="number" placeholder="Cost Price">
  <input id="selling_price" type="number" placeholder="Selling Price (optional)">
  <input id="stock" type="number" placeholder="Stock">

  <button onclick="addProduct()">Add</button>
  <button onclick="clearForm()">Clear</button>
</div>

<hr>

<!-- SEARCH (REDIRECT ONLY) -->
<div>
  <input id="search" placeholder="Search product">
  <button onclick="goToSearch()">Search</button>
</div>

<hr>

<!-- OPTIONAL: MANUAL LOAD BUTTON -->
<button onclick="loadProducts()">Load All Products</button>

<div id="list"></div>

<script>

const API = "https://inventory-system-eipk.onrender.com";

// BACK
function goBack() {
  window.location.href = "dashboard.html";
}

// 🔍 REDIRECT SEARCH (IMPORTANT CHANGE)
function goToSearch() {
  const query = document.getElementById("search").value.trim();

  if (!query) {
    alert("Enter product name");
    return;
  }

  window.location.href = `search.html?q=${encodeURIComponent(query)}`;
}

// ADD PRODUCT
async function addProduct() {
  const body = {
    name: document.getElementById("name").value,
    size: document.getElementById("size").value,
    price: document.getElementById("price").value,
    selling_price: document.getElementById("selling_price").value,
    stock: document.getElementById("stock").value
  };

  const res = await fetch(`${API}/products/`, {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify(body)
  });

  const data = await res.json();
  alert(data.message || "Saved");
}

// CLEAR FORM
function clearForm() {
  document.getElementById("name").value = "";
  document.getElementById("size").value = "";
  document.getElementById("price").value = "";
  document.getElementById("selling_price").value = "";
  document.getElementById("stock").value = "";
}

// OPTIONAL: LOAD ALL PRODUCTS (MANUAL ONLY)
async function loadProducts() {
  const res = await fetch(`${API}/products/`);
  let data = await res.json();

  if (!Array.isArray(data)) {
    alert("Error loading products");
    return;
  }

  render(data);
}

// RENDER FUNCTION
function render(data) {
  const div = document.getElementById("list");
  div.innerHTML = "";

  if (!data || data.length === 0) {
    div.innerHTML = "<p>No products</p>";
    return;
  }

  data.forEach(p => {
    div.innerHTML += `
      <div class="card">
        <b>${p.name}</b> (${p.size || ""})<br>
        Stock: ${p.stock || 0}<br>
        Cost: ${p.price || 0}<br>
        Selling: ${p.selling_price || "N/A"}<br>
      </div>
    `;
  });
}

</script>

</body>
</html>
