<!DOCTYPE html>
<html>
<head>
  <title>Products</title>

  <style>
    body {
      font-family: Arial;
      background: #f4f6f8;
      margin: 0;
      padding: 40px;
    }

    .topbar {
      display: flex;
      justify-content: space-between;
      margin-bottom: 20px;
    }

    button {
      padding: 10px 14px;
      border: none;
      cursor: pointer;
      border-radius: 6px;
    }

    .primary {
      background: #2563eb;
      color: white;
    }

    .secondary {
      background: #e5e7eb;
    }

    .form-row {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-bottom: 10px;
    }

    input, select {
      padding: 8px;
      border: 1px solid #ddd;
      border-radius: 6px;
      min-width: 120px;
    }

    .box {
      margin-top: 15px;
      font-weight: bold;
    }
  </style>
</head>

<body>

<div class="topbar">
  <h2>Products</h2>
  <button class="secondary" onclick="goToDashboard()">⬅ Dashboard</button>
</div>

<!-- FORM -->
<div class="form-row">
  <input id="name" placeholder="Product Name">

  <select id="size">
    <option value="">Select Size</option>
    <option>Big</option>
    <option>Medium</option>
    <option>Small</option>
  </select>

  <select id="category"></select>

  <input id="price" type="number" placeholder="Price">
  <input id="stock" type="number" placeholder="Stock">
</div>

<div class="form-row">
  <input id="expiry" type="date">
</div>

<div class="form-row">
  <button class="primary" onclick="addProduct()">Add Product</button>
  <button class="secondary" onclick="clearForm()">Clear</button>
</div>

<!-- MESSAGE -->
<div id="message" class="box"></div>

<script>

const API_URL = "https://inventory-system-eipk.onrender.com";

// NAV
function goToDashboard() {
  window.location.href = "dashboard.html";
}

// CATEGORY
const categories = ["Hair","Skin Care","Makeup","Fragrance","Hygienics"];

function loadCategoryDropdown() {
  const select = document.getElementById("category");

  select.innerHTML = `<option value="">Select Category</option>`;

  categories.forEach(cat => {
    select.innerHTML += `<option value="${cat}">${cat}</option>`;
  });
}

// ✅ FIXED ADD PRODUCT
async function addProduct() {
  const name = document.getElementById("name").value;
  const size = document.getElementById("size").value;
  const category = document.getElementById("category").value;
  const price = parseFloat(document.getElementById("price").value);
  const stock = parseInt(document.getElementById("stock").value);
  const expiry = document.getElementById("expiry").value;

  const message = document.getElementById("message");

  if (!name || !size || !price || !stock) {
    message.innerHTML = "Fill all required fields";
    message.style.color = "red";
    return;
  }

  try {
    const res = await fetch(`${API_URL}/products/`, {
      method: "POST",
      headers: {
        "Content-Type": "application/json"
      },
      body: JSON.stringify({
        name: name,
        size: size,
        price: price,
        stock: stock,
        category: category,
        expiry_date: expiry
      })
    });

    const data = await res.json();

    if (data.detail || data.error) {
      message.innerHTML = data.detail || data.error;
      message.style.color = "red";
    } else {
      message.innerHTML = "✅ Product added / stock updated";
      message.style.color = "green";
      clearForm();
    }

  } catch (err) {
    message.innerHTML = "❌ Error adding product";
    message.style.color = "red";
  }
}

// CLEAR
function clearForm() {
  document.getElementById("name").value = "";
  document.getElementById("size").value = "";
  document.getElementById("category").value = "";
  document.getElementById("price").value = "";
  document.getElementById("stock").value = "";
  document.getElementById("expiry").value = "";
}

// LOAD
window.onload = loadCategoryDropdown;

</script>

</body>
</html>
