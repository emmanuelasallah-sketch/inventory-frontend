<!DOCTYPE html>
<html>
<head>
  <title>Products</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      font-family: Arial;
      background: #f4f6f8;
      padding: 20px;
    }

    .topbar {
      display: flex;
      gap: 10px;
      align-items: center;
      margin-bottom: 20px;
    }

    button {
      padding: 10px;
      border: none;
      border-radius: 6px;
      background: #2563eb;
      color: white;
      cursor: pointer;
      min-height: 40px;
    }

    .secondary {
      background: #6b7280;
    }

    .row {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      margin-bottom: 10px;
    }

    input, select {
      padding: 10px;
      border: 1px solid #ddd;
      border-radius: 6px;
    }

    .info {
      margin-top: 20px;
      background: white;
      padding: 15px;
      border-radius: 8px;
    }

    @media (max-width: 768px) {
      .row {
        flex-direction: column;
      }

      input, select, button {
        width: 100%;
      }
    }
  </style>
</head>

<body>

<!-- TOP -->
<div class="topbar">
  <button class="secondary" onclick="goBack()">⬅ Dashboard</button>
  <h2>Products</h2>
</div>

<!-- ADD PRODUCT -->
<h3>Add Product</h3>

<div class="row">
  <input id="name" placeholder="Name">

  <select id="size">
    <option value="">Size</option>
    <option>Big</option>
    <option>Medium</option>
    <option>Small</option>
  </select>

  <!-- ✅ CATEGORY ONLY HERE -->
  <select id="category">
    <option value="">Optional Category</option>
  </select>

  <input id="price" type="number" placeholder="Cost Price">
  <input id="selling_price" type="number" placeholder="Selling Price (optional)">
</div>

<div class="row">
  <input id="stock" type="number" placeholder="Stock">
  <input id="expiry" type="date">

  <button onclick="addProduct()">Add</button>
  <button class="secondary" onclick="clearForm()">Clear</button>
</div>

<p id="message"></p>

<hr>

<!-- 🔍 SEARCH (REDIRECT ONLY) -->
<h3>Search Product</h3>

<div class="row">
  <input id="search" placeholder="Enter product name...">
  <button onclick="handleSearch()">Search</button>
</div>

<!-- EMPTY STATE -->
<div id="info" class="info">
  <p>🔍 Use the search above to find products.</p>
</div>

<script>

const API = "https://inventory-system-eipk.onrender.com";

// BACK
function goBack() {
  window.location.href = "dashboard.html";
}

// LOAD CATEGORIES
async function loadCategories() {
  try {
    const res = await fetch(`${API}/categories/`);
    const data = await res.json();

    const select = document.getElementById("category");
    select.innerHTML = `<option value="">Optional Category</option>`;

    if (Array.isArray(data)) {
      data.forEach(c => {
        select.innerHTML += `<option value="${c.id}">${c.name}</option>`;
      });
    }

  } catch (err) {
    console.error("Category error:", err);
  }
}

// ADD PRODUCT
async function addProduct() {
  const body = {
    name: document.getElementById("name").value,
    size: document.getElementById("size").value,
    category_id: document.getElementById("category").value || null,
    price: document.getElementById("price").value,
    selling_price: document.getElementById("selling_price").value,
    stock: document.getElementById("stock").value,
    expiry_date: document.getElementById("expiry").value || null
  };

  const res = await fetch(`${API}/products/`, {
    method: "POST",
    headers: {"Content-Type": "application/json"},
    body: JSON.stringify(body)
  });

  const data = await res.json();

  document.getElementById("message").innerText =
    data.message || data.detail || "Saved";

  clearForm();
}

// 🔍 SEARCH → REDIRECT
async function handleSearch() {
  const search = document.getElementById("search").value.toLowerCase();

  if (!search) {
    document.getElementById("list").innerHTML = "<p>Enter search term</p>";
    return;
  }

  const res = await fetch(`${API}/products/`);
  let data = await res.json();

  // 🛡️ safety fix
  if (!Array.isArray(data)) {
    console.error("Not array:", data);
    data = [];
  }

  const filtered = data.filter(p =>
    (p.name || "").toLowerCase().includes(search)
  );

  render(filtered);
}

// CLEAR FORM
function clearForm() {
  document.getElementById("name").value = "";
  document.getElementById("size").value = "";
  document.getElementById("category").value = "";
  document.getElementById("price").value = "";
  document.getElementById("selling_price").value = "";
  document.getElementById("stock").value = "";
  document.getElementById("expiry").value = "";
}

// INIT
window.onload = () => {
  loadCategories();
};

</script>

</body>
</html>
