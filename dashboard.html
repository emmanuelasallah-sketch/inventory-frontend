<!DOCTYPE html>
<html>
<head>
  <title>Dashboard</title>

  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

  <style>
    body {
      margin: 0;
      font-family: Arial;
      display: flex;
      background: #f4f6f8;
    }

    .sidebar {
      width: 190px;
      background: #111;
      color: white;
      height: 100vh;
      position: fixed;
      padding: 10px;
    }

    .sidebar h2 {
      color: orange;
    }

    .sidebar button {
      width: 100%;
      margin: 10px 0;
      padding: 10px;
      background: none;
      color: white;
      border: none;
      text-align: left;
      cursor: pointer;
    }

    .sidebar button:hover {
      background: #333;
    }

    .main {
      margin-left: 200px;
      padding: 20px;
      width: 100%;
    }

    .topbar {
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .alert-box {
      position: relative;
      cursor: pointer;
      font-size: 20px;
    }

    .badge {
      position: absolute;
      top: -6px;
      right: -10px;
      background: red;
      color: white;
      border-radius: 50%;
      padding: 3px 7px;
      font-size: 12px;
    }

    input {
      padding: 8px;
      width: 250px;
      margin-top: 15px;
    }

    button.search {
      padding: 8px 12px;
      background: #2563eb;
      color: white;
      border: none;
      cursor: pointer;
    }

    .card {
      background: white;
      padding: 15px;
      margin-top: 20px;
      border-radius: 8px;
    }

    button {
      min-height: 40px;
    }

    h2, h3 {
      font-size: 20px;
    }

    @media (max-width: 768px) {
      body {
        flex-direction: column;
      }

      .sidebar {
        position: relative;
        width: 100%;
        height: auto;
      }

      .main {
        margin-left: 0;
      }

      input, button {
        width: 100%;
      }
    }
  </style>
</head>

<body>

<!-- SIDEBAR -->
<div class="sidebar">
  <h2>Inventory</h2>

  <button onclick="go('products.html')">Products</button>
  <button onclick="go('sales.html')">Sales</button>
  <button onclick="go('categories.html')">Categories</button>
  <button onclick="go('stock_history.html')">Stock History</button>
  <button onclick="go('sales_history.html')">Sales History</button>
  <button onclick="go('alerts.html')">Alerts</button>

  <button onclick="logout()">Logout</button>
</div>

<!-- MAIN -->
<div class="main">

  <div class="topbar">
    <h1>Dashboard</h1>

    <div class="alert-box" onclick="go('alerts.html')">
      🔔
      <span id="alertCount" class="badge">0</span>
    </div>
  </div>

  <input id="searchInput" placeholder="Search product">
  <button class="search" onclick="goToSearch()">Search</button>

  <div class="card">
    <h3>Today's Sales</h3>
    <h2 id="todaySales">0</h2>
  </div>

  <div class="card">
    <h3>Sales Overview</h3>
    <canvas id="chart"></canvas>
  </div>

</div>

<script>

const API = "https://inventory-system-eipk.onrender.com";

// NAV
function go(page) {
  window.location.href = page;
}

function logout() {
  localStorage.removeItem("token");
  window.location.href = "index.html";
}

function goToSearch() {
  const q = document.getElementById("searchInput").value;
  if (!q) return alert("Enter product name");
  window.location.href = `search.html?q=${q}`;
}

// ALERTS
async function loadAlerts() {
  const res = await fetch(`${API}/products/alerts`);
  const data = await res.json();

  const badge = document.getElementById("alertCount");
  badge.innerText = data.length;

  badge.style.display = data.length ? "inline-block" : "none";
}

// TODAY SALES (FIXED)
async function loadTodaySales() {
  const res = await fetch(`${API}/sales-summary/today`);
  const data = await res.json();

  document.getElementById("todaySales").innerText =
    data.total_units_sold || 0;
}

// CHART (SAFE AGGREGATION)
async function loadChart() {
  const res = await fetch(`${API}/sales/`);
  const data = await res.json();

  const map = {};

  data.forEach(s => {
    const date = new Date(s.created_at).toISOString().split("T")[0];
    map[date] = (map[date] || 0) + (s.quantity_sold || 0);
  });

  new Chart(document.getElementById("chart"), {
    type: "bar",
    data: {
      labels: Object.keys(map),
      datasets: [{
        label: "Sales",
        data: Object.values(map)
      }]
    }
  });
}

// INIT
window.onload = function () {
  loadAlerts();
  loadTodaySales();
  loadChart();
};

// refresh alerts
setInterval(loadAlerts, 10000);

</script>

</body>
</html>
