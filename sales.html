<!DOCTYPE html>
<html>
<head>
  <title>POS Cart System</title>

  <style>
    body { font-family: Arial; padding: 20px; background: #f4f6f8; }
    input, select { padding: 8px; margin: 5px; }
    button { padding: 8px 12px; background: green; color: white; border: none; cursor: pointer; }

    .cart {
      margin-top: 20px;
      background: white;
      padding: 10px;
      border-radius: 6px;
    }

    .item {
      border-bottom: 1px solid #ddd;
      padding: 5px;
    }

    .total {
      font-weight: bold;
      font-size: 18px;
    }
  </style>
</head>

<body>

<h2>POS System</h2>

<input type="text" id="product" placeholder="Product name">
<select id="size">
  <option value="">Select Size</option>
    <option>Big</option>
    <option>Medium</option>
    <option>Small</option>
</select>
<input type="number" id="qty" placeholder="Quantity">

<button onclick="addToCart()">Add to Cart</button>

<div class="cart">
  <h3>Cart</h3>
  <div id="cartItems"></div>
  <p class="total" id="total"></p>
</div>

<button onclick="checkout()">Checkout</button>

<div id="message"></div>

<script>
const API_URL = "https://inventory-system-eipk.onrender.com";

let products = [];
let cart = [];

async function loadProducts() {
  const res = await fetch(`${API_URL}/products`);
  products = await res.json();
}

function addToCart() {
  const name = document.getElementById("product").value;
  const size = document.getElementById("size").value;
  const qty = parseInt(document.getElementById("qty").value);

  const product = products.find(p => p.name === name && p.size == size);

  if (!product) return alert("Product not found");

  cart.push({
    product_name: name,
    size: size,
    quantity: qty,
    price: product.price
  });

  renderCart();
}

function renderCart() {
  const container = document.getElementById("cartItems");
  container.innerHTML = "";

  let total = 0;

  cart.forEach((item, index) => {
    const itemTotal = item.quantity * item.price;
    total += itemTotal;

    container.innerHTML += `
      <div class="item">
        ${item.product_name} (${item.size}) x${item.quantity} = ${itemTotal}
        <button onclick="removeItem(${index})">❌</button>
      </div>
    `;
  });

  document.getElementById("total").innerText = "Total: " + total;
}

function removeItem(index) {
  cart.splice(index, 1);
  renderCart();
}

async function checkout() {
  if (cart.length === 0) return alert("Cart is empty");

  const res = await fetch(`${API_URL}/sales/checkout`, {
    method: "POST",
    headers: {"Content-Type": "application/json"},
    body: JSON.stringify({ items: cart })
  });

  const data = await res.json();

  if (data.error) {
    document.getElementById("message").innerText = data.error;
  } else {
    document.getElementById("message").innerText =
      `Order #${data.order_id} completed. Total: ${data.total}`;

    cart = [];
    renderCart();
  }
}

window.onload = loadProducts;
</script>

</body>
</html>
