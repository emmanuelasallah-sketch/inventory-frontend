<body>

<button class="secondary" onclick="goBack()">⬅ Dashboard</button>

<h2>🛒 Sales</h2>

<!-- INPUT -->
<div style="position:relative;">
  <input id="name" placeholder="Product Name" oninput="showSuggestions()">

  <div id="suggestions" class="suggestions"></div>

  <select id="size">
    <option value="">Size</option>
    <option>Big</option>
    <option>Medium</option>
    <option>Small</option>
  </select>

  <input id="quantity" type="number" placeholder="Qty">

  <button onclick="checkStock()">Check</button>
</div>

<div id="stockInfo"></div>

<button onclick="addToCart()">Add to Cart</button>

<hr>

<h3>Cart</h3>
<div id="cart"></div>

<div class="total">Total: <span id="total">0</span></div>

<button onclick="checkout()">✅ Complete Sale</button>

<hr>

<h3>📊 Today's Sales</h3>
<div id="todaySales" class="card"></div>

<div id="message"></div>

<script>

const API_URL = "https://inventory-system-eipk.onrender.com";

let cart = [];
let products = [];
let currentProduct = null;

// BACK
function goBack() {
  window.location.href = "dashboard.html";
}

// LOAD PRODUCTS
async function loadProducts() {
  const res = await fetch(`${API_URL}/products/`);
  products = await res.json();
}

// AUTO SUGGEST
function showSuggestions() {
  const input = document.getElementById("name").value.toLowerCase();
  const box = document.getElementById("suggestions");

  box.innerHTML = "";

  if (!input) return;

  const filtered = products.filter(p =>
    p.name.toLowerCase().includes(input)
  );

  filtered.slice(0, 5).forEach(p => {
    const div = document.createElement("div");
    div.innerText = p.name;
    div.onclick = () => {
      document.getElementById("name").value = p.name;
      box.innerHTML = "";
    };
    box.appendChild(div);
  });
}

// CHECK STOCK
function checkStock() {
  const name = document.getElementById("name").value;
  const size = document.getElementById("size").value;

  const product = products.find(p =>
    p.name.toLowerCase() === name.toLowerCase() &&
    p.size === size
  );

  const stockInfo = document.getElementById("stockInfo");

  if (!product) {
    stockInfo.innerHTML = "❌ Product not found";
    currentProduct = null;
    return;
  }

  currentProduct = product;

  const priceToUse = product.selling_price || product.price;

  stockInfo.innerHTML = `
    ✅ Found <br>
    Stock: <b>${product.stock}</b><br>
    Price: <b>${priceToUse}</b>
  `;
}

// ADD TO CART
function addToCart() {
  const qty = parseInt(document.getElementById("quantity").value);

  if (!currentProduct || !qty) {
    alert("Check product first");
    return;
  }

  if (qty > currentProduct.stock) {
    alert("Not enough stock");
    return;
  }

  const priceToUse = currentProduct.selling_price || currentProduct.price;

  // Prevent duplicate entries → merge quantities
  const existing = cart.find(item =>
    item.product_name === currentProduct.name &&
    item.size === currentProduct.size
  );

  if (existing) {
    existing.quantity += qty;
  } else {
    cart.push({
      product_name: currentProduct.name,
      size: currentProduct.size,
      quantity: qty,
      price: priceToUse
    });
  }

  renderCart();
}

// RENDER CART
function renderCart() {
  const container = document.getElementById("cart");
  container.innerHTML = "";

  let total = 0;

  cart.forEach((item, index) => {
    const subtotal = item.price * item.quantity;
    total += subtotal;

    container.innerHTML += `
      <div class="cart-item card">
        <div>
          <b>${item.product_name}</b> (${item.size})<br>
          ${item.quantity} × ${item.price} = <b>${subtotal}</b>
        </div>
        <button onclick="removeItem(${index})">❌</button>
      </div>
    `;
  });

  document.getElementById("total").innerText = total;
}

// REMOVE ITEM
function removeItem(index) {
  cart.splice(index, 1);
  renderCart();
}

// CHECKOUT (REAL TRANSACTION)
async function checkout() {
  if (cart.length === 0) {
    alert("Cart is empty");
    return;
  }

  const confirmSale = confirm("Complete this sale?");
  if (!confirmSale) return;

  const res = await fetch(`${API_URL}/sales/`, {
    method: "POST",
    headers: {
      "Content-Type": "application/json"
    },
    body: JSON.stringify({ items: cart })
  });

  const data = await res.json();
  const message = document.getElementById("message");

  if (data.error || data.detail) {
    message.innerHTML = data.error || data.detail;
    message.style.color = "red";
    return;
  }

  // SUCCESS FLOW
  message.innerHTML = "✅ Sale completed successfully";
  message.style.color = "green";

  cart = [];
  renderCart();

  // Reload products → reflects updated stock
  await loadProducts();

  // Refresh sales summary
  loadTodaySales();
}

// TODAY SALES
async function loadTodaySales() {
  const res = await fetch(`${API_URL}/sales/today`);
  const data = await res.json();

  document.getElementById("todaySales").innerHTML = `
    Date: ${data.date} <br>
    Items Sold: ${data.total_items_sold}
  `;
}

// INIT
window.onload = function() {
  loadProducts();
  loadTodaySales();
};

</script>
</body>
</html>
