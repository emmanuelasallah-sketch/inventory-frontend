<!DOCTYPE html>
<html>
<head>
  <title>Edit Product</title>

  <style>
    body {
      font-family: Arial;
      background: #f4f6f8;
      padding: 20px;
      display: flex;
      justify-content: center;
    }

    .container {
      width: 100%;
      max-width: 500px;
    }

    .topbar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 20px;
    }

    h2 {
      margin: 20px;
    }

    .form {
      background: white;
      padding: 20px;
      border-radius: 12px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.05);
    }

    input, select {
      width: 95%;
      padding: 10px;
      margin: 8px 0;
      border-radius: 6px;
      border: 1px solid #ccc;
      font-size: 14px;
    }

    .actions {
      display: flex;
      gap: 10px;
      margin-top: 15px;
    }

    button {
      flex: 1;
      padding: 10px;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      color: white;
      font-size: 14px;
    }

    .primary {
      background: #2563eb;
    }

    .secondary {
      background: #6b7280;
    }

    .back-btn {
      background: #2563eb;
      padding: 8px 12px;
      font-size: 14px;
    }
  </style>
</head>

<body>

<div class="container">

  <div class="topbar">
    <button class="back-btn" onclick="goToDashboard()">⬅ Dashboard</button>
    <h2>Edit Product</h2>
  </div>

  <div class="form">

    <input id="name" placeholder="Product Name">

    <select id="category">
      <option value="">Select Category</option>
      <option value="fragrance">Fragrance</option>
      <option value="haircare">Haircare</option>
      <option value="skincare">Skincare</option>
      <option value="hygienics">Hygienics</option>
      <option value="others">Others</option>
    </select>

    <select id="size">
      <option value="">Select Size</option>
      <option value="Big">Big</option>
      <option value="Medium">Medium</option>
      <option value="Small">Small</option>
    </select>

    <input id="price" type="number" placeholder="Cost Price">
    <input id="selling_price" type="number" placeholder="Selling Price">
    <input id="stock" type="number" placeholder="Stock">

    <div class="actions">
      <button class="primary" onclick="updateProduct()">💾 Update</button>
      <button class="secondary" onclick="goBack()">Cancel</button>
    </div>

  </div>

</div>

<script>

const API_URL = "https://inventory-system-eipk.onrender.com";

let productId = null;

// GET ID
function getId() {
  const params = new URLSearchParams(window.location.search);
  productId = params.get("id");
}

// LOAD PRODUCT
async function loadProduct() {
  const res = await fetch(`${API_URL}/products/`);
  const data = await res.json();

  const product = data.find(p => p.id == productId);

  if (!product) {
    alert("Product not found");
    return;
  }

  document.getElementById("name").value = product.name || "";
  document.getElementById("category").value = (product.category || "").toLowerCase();
  document.getElementById("size").value = product.size || "";
  document.getElementById("price").value = product.price || "";
  document.getElementById("selling_price").value = product.selling_price || "";
  document.getElementById("stock").value = product.stock || "";
}

// UPDATE
async function updateProduct() {
  const body = {
    name: document.getElementById("name").value,
    category: document.getElementById("category").value,
    size: document.getElementById("size").value,
    price: document.getElementById("price").value,
    selling_price: document.getElementById("selling_price").value,
    stock: document.getElementById("stock").value
  };

  const res = await fetch(`${API_URL}/products/${productId}`, {
    method: "PUT",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify(body)
  });

  const data = await res.json();

  alert(data.message || "Updated successfully");

  window.location.href = "search.html";
}

// NAVIGATION
function goToDashboard() {
  window.location.href = "dashboard.html";
}

function goBack() {
  window.location.href = "search.html";
}

// INIT
window.onload = function() {
  getId();
  loadProduct();
};

</script>

</body>
</html>
